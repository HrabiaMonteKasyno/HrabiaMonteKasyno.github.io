<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Virtual Casino</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:linear-gradient(135deg,#050505,#111827);
        color:white;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:20px;
    }

    .casino{
        width:100%;
        max-width:700px;
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(255,255,255,0.1);
        backdrop-filter:blur(10px);
        border-radius:20px;
        padding:30px;
        text-align:center;
        box-shadow:0 0 25px rgba(0,255,120,0.2);
    }

    h1{
        color:gold;
        margin-bottom:20px;
        text-shadow:0 0 15px gold;
    }

    .coins{
        font-size:24px;
        margin-bottom:20px;
        color:#00ff99;
    }

    .roulette{
        width:220px;
        height:220px;
        border-radius:50%;
        margin:20px auto;
        border:10px solid gold;
        position:relative;
        overflow:hidden;
        transition:transform 4s ease-out;
        background:
        conic-gradient(
            green 0deg 10deg,
            red 10deg 20deg,
            black 20deg 30deg,
            red 30deg 40deg,
            black 40deg 50deg,
            red 50deg 60deg,
            black 60deg 70deg,
            red 70deg 80deg,
            black 80deg 90deg,
            red 90deg 100deg,
            black 100deg 110deg,
            red 110deg 120deg,
            black 120deg 130deg,
            red 130deg 140deg,
            black 140deg 150deg,
            red 150deg 160deg,
            black 160deg 170deg,
            red 170deg 180deg,
            black 180deg 190deg,
            red 190deg 200deg,
            black 200deg 210deg,
            red 210deg 220deg,
            black 220deg 230deg,
            red 230deg 240deg,
            black 240deg 250deg,
            red 250deg 260deg,
            black 260deg 270deg,
            red 270deg 280deg,
            black 280deg 290deg,
            red 290deg 300deg,
            black 300deg 310deg,
            red 310deg 320deg,
            black 320deg 330deg,
            red 330deg 340deg,
            black 340deg 350deg,
            red 350deg 360deg
        );
    }

    .ball{
        width:20px;
        height:20px;
        background:white;
        border-radius:50%;
        position:absolute;
        top:10px;
        left:100px;
        box-shadow:0 0 10px white;
    }

    .pointer{
        width:0;
        height:0;
        border-left:15px solid transparent;
        border-right:15px solid transparent;
        border-top:30px solid gold;
        margin:0 auto;
    }

    input, select{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        font-size:16px;
    }

    button{
        margin-top:15px;
        padding:14px 20px;
        border:none;
        border-radius:12px;
        background:linear-gradient(45deg,#ff0000,#ff9900);
        color:white;
        font-size:18px;
        cursor:pointer;
        transition:0.3s;
        width:100%;
    }

    button:hover{
        transform:scale(1.05);
        box-shadow:0 0 15px red;
    }

    .result{
        margin-top:20px;
        font-size:22px;
        font-weight:bold;
    }

    .history{
        margin-top:20px;
        display:flex;
        flex-wrap:wrap;
        gap:10px;
        justify-content:center;
    }

    .history span{
        padding:10px;
        border-radius:8px;
        min-width:40px;
    }

    .red{
        background:red;
    }

    .black{
        background:black;
        border:1px solid white;
    }

    .green{
        background:green;
    }

    .stats{
        margin-top:20px;
        display:flex;
        justify-content:space-around;
    }

    .warning{
        margin-top:20px;
        color:#aaa;
        font-size:14px;
    }
</style>
</head>

<body>

<div class="casino">

    <h1>🎰 Virtual Casino</h1>

    <div class="coins">
        Monety: <span id="coins">1000</span>
    </div>

    <div class="pointer"></div>

    <div class="roulette" id="roulette">
        <div class="ball"></div>
    </div>

    <select id="betType">
        <option value="red">Czerwone</option>
        <option value="black">Czarne</option>
        <option value="number">Numer</option>
    </select>

    <input type="number" id="numberInput" placeholder="Wpisz numer 0-36">

    <input type="number" id="betAmount" placeholder="Ilość monet">

    <button onclick="spinRoulette()">🎲 Zakręć</button>

    <button onclick="resetCoins()">🔄 Reset monet</button>

    <div class="result" id="result"></div>

    <div class="stats">
        <div>✅ Wygrane: <span id="wins">0</span></div>
        <div>❌ Przegrane: <span id="losses">0</span></div>
    </div>

    <div class="history" id="history"></div>

    <div class="warning">
        To tylko symulacja — brak prawdziwego hazardu.
    </div>

</div>

<script>

let coins = 1000;
let wins = 0;
let losses = 0;
let historyList = [];

const redNumbers = [
1,3,5,7,9,12,14,16,18,
19,21,23,25,27,30,32,34,36
];

function getColor(number){
    if(number === 0) return "green";
    return redNumbers.includes(number) ? "red" : "black";
}

function updateUI(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("wins").innerText = wins;
    document.getElementById("losses").innerText = losses;

    const history = document.getElementById("history");
    history.innerHTML = "";

    historyList.slice(-10).reverse().forEach(item=>{
        const span = document.createElement("span");
        span.className = item.color;
        span.innerText = item.number;
        history.appendChild(span);
    });
}

function spinRoulette(){

    const betType = document.getElementById("betType").value;
    const betAmount = parseInt(document.getElementById("betAmount").value);
    const chosenNumber = parseInt(document.getElementById("numberInput").value);

    if(isNaN(betAmount) || betAmount <= 0){
        alert("Wpisz poprawną ilość monet");
        return;
    }

    if(betAmount > coins){
        alert("Nie masz tylu monet");
        return;
    }

    const roulette = document.getElementById("roulette");

    const randomDegree = 3600 + Math.floor(Math.random()*360);

    roulette.style.transform = `rotate(${randomDegree}deg)`;

    setTimeout(()=>{

        const number = Math.floor(Math.random()*37);
        const color = getColor(number);

        historyList.push({
            number:number,
            color:color
        });

        let win = false;
        let reward = 0;

        if(betType === "red" && color === "red"){
            win = true;
            reward = betAmount * 2;
        }

        if(betType === "black" && color === "black"){
            win = true;
            reward = betAmount * 2;
        }

        if(betType === "number" && chosenNumber === number){
            win = true;
            reward = betAmount * 10;
        }

        const result = document.getElementById("result");

        if(win){
            coins += reward;
            wins++;

            result.innerHTML =
            `🎉 WYGRANA! Wylosowano ${number} (${color}) +${reward} monet`;

            result.style.color = "#00ff99";

        }else{
            coins -= betAmount;
            losses++;

            result.innerHTML =
            `💀 PRZEGRANA! Wylosowano ${number} (${color})`;

            result.style.color = "red";
        }

        updateUI();

    },4000);
}

function resetCoins(){
    coins = 1000;
    wins = 0;
    losses = 0;
    historyList = [];
    updateUI();
}

updateUI();

</script>

</body>
</html>
